name: Publish Artifacts

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  PYTHON_VERSION: "3.13"

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve package names
        id: names
        shell: bash
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "package=openstack-pomerium-nova-reconciler" >> "$GITHUB_OUTPUT"

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          base_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${base_version}-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run Ruff lint
        run: python -m ruff check .

      - name: Check Ruff formatting
        run: python -m ruff format --check .

      - name: Run mypy
        run: python -m mypy

      - name: Build Python distributions
        run: python -m build

      - name: Upload Python package artifact
        uses: actions/upload-artifact@v4
        with:
          name: openstack-pomerium-nova-reconciler-python-dist
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error

      - name: Generate release checksums
        if: github.ref_type == 'tag'
        run: |
          cd dist
          sha256sum *.tar.gz *.whl > "${{ steps.names.outputs.package }}-${{ steps.version.outputs.version }}.sha256"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.names.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write release notes
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          cat > dist/release-notes.md <<EOF
          ## Artifacts

          Docker image:

          \`\`\`text
          ${{ steps.names.outputs.image }}:${{ steps.version.outputs.version }}
          \`\`\`

          Python distributions:

          \`\`\`bash
          pip install ./openstack_pomerium_nova_reconciler-${{ steps.version.outputs.version }}-py3-none-any.whl
          \`\`\`

          The source distribution, wheel, and SHA256 checksum are attached to this release.
          EOF

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: openstack-pomerium-nova-reconciler ${{ steps.version.outputs.version }}
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.sha256
